
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { max-width: 620px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; margin-top: 1rem; }
label:first-of-type { margin-top: 0; }
input { width: 100%; font-family: var(--font-sans); }
.sec { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 10px; }
.legend { display: flex; gap: 16px; margin-bottom: 1rem; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.ldot { width: 12px; height: 12px; border-radius: 3px; border: 0.5px solid var(--color-border-tertiary); }
.timeline-row { display: flex; height: 52px; border-radius: var(--border-radius-md); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
.tblock { display: flex; align-items: center; justify-content: center; border-right: 0.5px solid var(--color-border-tertiary); cursor: pointer; transition: background 0.1s; user-select: none; }
.tblock:last-child { border-right: none; }
.tblock.free { background: var(--color-background-primary); }
.tblock.free:hover { background: var(--color-background-info); }
.tblock.booked { background: var(--color-background-secondary); cursor: not-allowed; }
.tblock.selected { background: var(--color-background-info); }
.tlabel { font-size: 10px; line-height: 1.3; text-align: center; padding: 0 2px; color: var(--color-text-secondary); }
.tblock.selected .tlabel { color: var(--color-text-info); font-weight: 500; }
.tblock.booked .tlabel { color: var(--color-text-tertiary); }
.tblock.free:hover .tlabel { color: var(--color-text-info); }
.tick-row { display: flex; margin-top: 4px; }
.tick { font-size: 10px; color: var(--color-text-tertiary); flex: 1; padding-left: 2px; }
.dur-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.dbtn { padding: 8px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-secondary); font-family: var(--font-sans); }
.dbtn:hover:not(:disabled) { border-color: var(--color-border-secondary); color: var(--color-text-primary); }
.dbtn.on { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); font-weight: 500; }
.dbtn:disabled { opacity: 0.35; cursor: not-allowed; }
.summary { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 13px; color: var(--color-text-secondary); margin-top: 1rem; min-height: 38px; display: flex; align-items: center; }
.summary strong { color: var(--color-text-primary); font-weight: 500; margin-right: 4px; }
.submit { width: 100%; margin-top: 1.25rem; padding: 11px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); }
.submit:hover:not(:disabled) { opacity: 0.85; }
.submit:disabled { opacity: 0.4; cursor: not-allowed; }
.banner { background: var(--color-background-success); border: 0.5px solid var(--color-border-success); color: var(--color-text-success); padding: 12px 16px; border-radius: var(--border-radius-md); font-size: 14px; margin-bottom: 1rem; display: none; }
.empty { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
</style>

<div class="wrap">
  <h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">VR headset booking form</h2>
  <h1>Book the VR headset</h1>
  <p class="sub">Pick a start time, choose your duration, then confirm your details.</p>

  <div class="banner" id="banner">Your booking is confirmed! See you then.</div>

  <div class="card">
    <div class="legend">
      <div class="legend-item"><div class="ldot" style="background:var(--color-background-primary)"></div> Available</div>
      <div class="legend-item"><div class="ldot" style="background:var(--color-background-secondary)"></div> Taken</div>
      <div class="legend-item"><div class="ldot" style="background:var(--color-background-info);border-color:var(--color-border-info)"></div> Your selection</div>
    </div>
    <div id="timelines"></div>
    <div class="empty" id="no-avail" style="display:none;">No availability yet — check back soon!</div>
  </div>

  <div class="card" id="dur-card" style="display:none;">
    <div class="sec">How long do you need?</div>
    <div class="dur-grid" id="dur-grid"></div>
    <div class="summary" id="summary">Select a duration above.</div>
  </div>

  <div class="card">
    <label style="margin-top:0;">Your name</label>
    <input type="text" id="name" placeholder="Jane Smith" />
    <label>Contact (email or phone)</label>
    <input type="text" id="contact" placeholder="jane@example.com" />
    <button class="submit" id="sub-btn" onclick="submit()" disabled>Choose a time to continue</button>
  </div>
</div>

<script>
const KEY = 'vr_v2';
let sel = null;

function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || '{"blocks":[],"bookings":[]}'); }
  catch { return {blocks:[],bookings:[]}; }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function mins(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function addM(t,m) { const v=mins(t)+m; return `${String(Math.floor(v/60)).padStart(2,'0')}:${String(v%60).padStart(2,'0')}`; }
function fmtT(t) { const [h,m]=t.split(':').map(Number); return `${((h%12)||12)}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`; }
function fmtD(s) { return new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }

function slots(b) {
  const n=(mins(b.end)-mins(b.start))/30;
  return Array.from({length:n},(_,i)=>({idx:i,st:addM(b.start,i*30),et:addM(b.start,(i+1)*30)}));
}
function occupied(b, bookings) {
  const s=new Set();
  bookings.filter(x=>x.blockId===b.id).forEach(x=>{ for(let i=x.startIdx;i<=x.endIdx;i++) s.add(i); });
  return s;
}

function render() {
  const d = load();
  const wrap = document.getElementById('timelines');
  const none = document.getElementById('no-avail');
  const blocks = [...d.blocks].sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
  if (!blocks.length) { wrap.innerHTML=''; none.style.display=''; return; }
  none.style.display='none';
  const pct = b => 100/slots(b).length;
  wrap.innerHTML = blocks.map(b=>{
    const sl=slots(b), occ=occupied(b,d.bookings), bsel=sel&&sel.blockId===b.id, p=pct(b);
    const rows=sl.map(s=>{
      const tk=occ.has(s.idx), isSel=bsel&&s.idx>=sel.si&&s.idx<=sel.ei;
      const cls=tk?'booked':isSel?'selected':'free';
      return `<div class="tblock ${cls}" style="width:${p}%" onclick="clickSlot('${b.id}',${s.idx},${tk})">
        <span class="tlabel">${fmtT(s.st).replace(' AM','a').replace(' PM','p')}</span>
      </div>`;
    }).join('');
    const ticks=sl.map(s=>`<div class="tick" style="width:${p}%">${s.idx%2===0?fmtT(s.st):''}</div>`).join('');
    return `<div style="margin-bottom:1.25rem">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px">${fmtD(b.date)} &nbsp;·&nbsp; ${fmtT(b.start)} – ${fmtT(b.end)}</div>
      <div class="timeline-row">${rows}</div>
      <div class="tick-row">${ticks}</div>
    </div>`;
  }).join('');
}

function clickSlot(bid,idx,taken) {
  if(taken) return;
  if(sel&&sel.blockId===bid) {
    if(idx===sel.si) { sel=null; }
    else {
      const ni={si:Math.min(sel.si,idx),ei:Math.max(sel.si,idx)};
      const d=load(); const b=d.blocks.find(x=>x.id===bid); const occ=occupied(b,d.bookings);
      for(let i=ni.si;i<=ni.ei;i++) if(occ.has(i)){ni.si=idx;ni.ei=idx;break;}
      sel={blockId:bid,...ni};
    }
  } else { sel={blockId:bid,si:idx,ei:idx}; }
  render(); renderDur();
}

function renderDur() {
  const dc=document.getElementById('dur-card'), dg=document.getElementById('dur-grid'), sm=document.getElementById('summary'), btn=document.getElementById('sub-btn');
  if(!sel){dc.style.display='none';btn.disabled=true;btn.textContent='Choose a time to continue';return;}
  dc.style.display='';
  const d=load(); const b=d.blocks.find(x=>x.id===sel.blockId); const sl=slots(b); const occ=occupied(b,d.bookings);
  let max=0; for(let i=sel.si;i<sl.length;i++){if(occ.has(i))break;max++;}
  const cur=sel.ei-sel.si+1;
  dg.innerHTML=Array.from({length:max},(_,i)=>i+1).map(n=>{
    const m=n*30; const lbl=m<60?`${m} min`:`${m/60}h${m%60?` ${m%60}m`:''}`;
    return `<button class="dbtn${n===cur?' on':''}" onclick="setDur(${n})">${lbl}</button>`;
  }).join('');
  sm.innerHTML=`<strong>${fmtD(b.date)}</strong> &nbsp; ${fmtT(sl[sel.si].st)} – ${fmtT(sl[sel.ei].et)} &nbsp; (${cur*30} min)`;
  btn.disabled=false; btn.textContent='Confirm booking';
}

function setDur(n) { sel.ei=sel.si+n-1; render(); renderDur(); }

function submit() {
  const name=document.getElementById('name').value.trim(), contact=document.getElementById('contact').value.trim();
  if(!name||!contact){alert('Please enter your name and contact info.');return;}
  if(!sel){alert('Please choose a time.');return;}
  const d=load(); const b=d.blocks.find(x=>x.id===sel.blockId); const occ=occupied(b,d.bookings);
  for(let i=sel.si;i<=sel.ei;i++) if(occ.has(i)){alert('Sorry, that time was just taken. Please choose again.');sel=null;render();renderDur();return;}
  const sl=slots(b);
  d.bookings.push({id:'b'+Date.now(),blockId:sel.blockId,startIdx:sel.si,endIdx:sel.ei,startTime:sl[sel.si].st,endTime:sl[sel.ei].et,date:b.date,name,contact,createdAt:new Date().toISOString()});
  save(d);
  sel=null; document.getElementById('name').value=''; document.getElementById('contact').value='';
  render(); renderDur();
  const bn=document.getElementById('banner'); bn.style.display=''; setTimeout(()=>bn.style.display='none',5000);
}

function init() {
  const d=load();
  if(!d.blocks.length) {
    const t=new Date(); t.setDate(t.getDate()+1);
    const fmt=x=>x.toISOString().split('T')[0];
    const d1=fmt(t); t.setDate(t.getDate()+2); const d2=fmt(t);
    d.blocks=[{id:'bl1',date:d1,start:'09:00',end:'12:00'},{id:'bl2',date:d2,start:'13:00',end:'17:00'}];
    save(d);
  }
  render();
}
init();
</script>
